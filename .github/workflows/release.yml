name: Release

# 推送 vX.Y.Z 标签时构建 Windows 独立安装包(MSI/NSIS,内含 PyInstaller 冻结的
# Python 后端 sidecar)并创建草稿 Release;也可通过 workflow_dispatch 手动验证构建
# (不创建 Release,产物以 artifact 形式上传)。
#
# 仅 Windows:ddddocr 依赖的 onnxruntime 无 macOS universal2 wheel,且桌面通知
# (win11toast/DPAPI)本就 Windows 专属,macOS 暂不产出独立安装包。
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 与 ci.yml 一致:锁文件由 npm 11 生成,需 Node 24 (npm 11) 才能通过 npm ci 同步检查。
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install node dependencies
        run: npm ci

      # 冻结 Python 后端:setup-python 用 python.org 构建,_ctypes 等原生依赖自带,
      # 不会遇到 conda 环境缺 libffi 的问题;spec 里的 conda 兜底逻辑在此为空操作。
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Clean backend staging
        shell: pwsh
        run: Remove-Item -LiteralPath src-tauri/resources/sjtu-backend -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build backend sidecar (PyInstaller)
        run: python -m PyInstaller sjtu-backend.spec --distpath src-tauri/resources --noconfirm

      # 离线自检:确认冻结产物能加载原生依赖，并以 UTF-8 输出中文。
      - name: Verify sidecar
        run: python -c "import subprocess; p=subprocess.run(['src-tauri/resources/sjtu-backend/sjtu-backend.exe', 'selfcheck'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=True); text=p.stdout.decode('utf-8'); assert '中文编码验证：交我选' in text, text"

      - name: Verify clean release resources
        shell: pwsh
        run: |
          $forbidden = @('.env', 'secrets.local.json', 'state.json', 'swap_state.json', 'user_settings.json', 'catalog.json', 'zzxk_capacity.json', 'seat_details.json', 'ratings.json', 'changes.log')
          $found = Get-ChildItem -LiteralPath src-tauri/resources/sjtu-backend -Recurse -File | Where-Object { $_.Name -in $forbidden }
          if ($found) { throw "Runtime data was bundled: $($found.FullName -join ', ')" }

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri-winres 需要 rc.exe;运行器 SDK 版本不定,按实际安装版本定位并通过 RC 传入。
      - name: Locate rc.exe
        shell: pwsh
        run: |
          if (-not $env:RC) {
            $rc = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\rc.exe' -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending | Select-Object -First 1
            if ($rc) { "RC=$($rc.FullName)" >> $env:GITHUB_ENV }
          }

      - name: Verify release version alignment
        shell: pwsh
        run: pwsh -File scripts/check-release-version.ps1

      # --config 合入 tauri.bundle.conf.json,仅在打包时加入 sidecar 资源;
      # 基础 tauri.conf.json 不含 resources,保证 dev(python gui.py)与 ci 的 cargo check
      # 在未构建 sidecar 时也不会因 glob 匹配不到而失败。tagName 为空时只构建、不建 Release。
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --config src-tauri/tauri.bundle.conf.json
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('交我选 {0}', github.ref_name) || '' }}
          releaseDraft: true
          includeUpdaterJson: false

      - name: Package Microsoft Store MSIX
        shell: pwsh
        env:
          MSIX_CERTIFICATE_BASE64: ${{ secrets.MSIX_CERTIFICATE_BASE64 }}
          MSIX_CERTIFICATE_PASSWORD: ${{ secrets.MSIX_CERTIFICATE_PASSWORD }}
          IS_TAG_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          if (-not $env:MSIX_CERTIFICATE_BASE64 -or -not $env:MSIX_CERTIFICATE_PASSWORD) {
            if ($env:IS_TAG_RELEASE -eq 'true') {
              throw "标签发布缺少 MSIX_CERTIFICATE_BASE64 或 MSIX_CERTIFICATE_PASSWORD。请按 docs/microsoft-store.md 配置与 Partner Center Publisher 匹配的 PFX。"
            }
            $version = (Get-Content package.json -Raw | ConvertFrom-Json).version + '.0'
            pwsh -File packaging/build-msix.ps1 -Version $version -SkipSign
            exit $LASTEXITCODE
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP 'sjtu-monitor-store-signing.pfx'
          [System.IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:MSIX_CERTIFICATE_BASE64))
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version + '.0'
          pwsh -File packaging/build-msix.ps1 -Version $version -CertificatePath $certificatePath -CertificatePassword $env:MSIX_CERTIFICATE_PASSWORD

      - name: Upload MSIX to draft GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} src-tauri/target/release/bundle/msix/*.msix --clobber

      - name: Upload installers (manual run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msix/*.msix
