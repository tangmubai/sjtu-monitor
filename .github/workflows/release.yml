name: Release

# 推送 vX.Y.Z 标签时构建 Windows 安装包并创建草稿 Release;
# 也可通过 workflow_dispatch 手动验证构建(不创建 Release, 产物以 artifact 形式上传)。
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VITE_SJTU_RELEASE: '1'
      SJTU_MONITOR_RELEASE: '1'
    steps:
      - uses: actions/checkout@v4

      # 与 ci.yml 一致: 锁文件由 npm 11 生成, 需 Node 24 (npm 11) 才能通过 npm ci 同步检查。
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri-winres 需要 rc.exe; scripts/tauri-env.mjs 只硬编码了 SDK 10.0.26100.0,
      # 运行器 SDK 版本不同时在此按实际安装版本定位并通过 RC 环境变量传入。
      - name: Locate rc.exe
        shell: pwsh
        run: |
          if (-not $env:RC) {
            $rc = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\rc.exe' -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending | Select-Object -First 1
            if ($rc) { "RC=$($rc.FullName)" >> $env:GITHUB_ENV }
          }

      # tauri-action 自动使用 package.json 的 "tauri" 脚本 (scripts/tauri-env.mjs),
      # 与本地构建走同一入口。tagName 为空时只构建、不创建 Release。
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('交我选 {0}', github.ref_name) || '' }}
          releaseDraft: true
          includeUpdaterJson: false

      - name: Upload installers (manual run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
