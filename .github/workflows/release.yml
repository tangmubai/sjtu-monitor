name: Release

# 推送 vX.Y.Z 标签时构建 Windows 独立安装包(MSI/NSIS,内含 PyInstaller 冻结的
# Python 后端 sidecar)并创建草稿 Release;也可通过 workflow_dispatch 手动验证构建
# (不创建 Release,产物以 artifact 形式上传)。
#
# 仅 Windows:ddddocr 依赖的 onnxruntime 无 macOS universal2 wheel,且桌面通知
# (win11toast/DPAPI)本就 Windows 专属,macOS 暂不产出独立安装包。
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 与 ci.yml 一致:锁文件由 npm 11 生成,需 Node 24 (npm 11) 才能通过 npm ci 同步检查。
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install node dependencies
        run: npm ci

      # 冻结 Python 后端:setup-python 用 python.org 构建,_ctypes 等原生依赖自带,
      # 不会遇到 conda 环境缺 libffi 的问题;spec 里的 conda 兜底逻辑在此为空操作。
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build backend sidecar (PyInstaller)
        run: python -m PyInstaller sjtu-backend.spec --distpath src-tauri/resources --noconfirm

      # 离线自检:确认冻结产物能加载 ddddocr/onnxruntime 等易漏打包的原生依赖。
      - name: Verify sidecar
        run: ./src-tauri/resources/sjtu-backend/sjtu-backend.exe selfcheck

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri-winres 需要 rc.exe;运行器 SDK 版本不定,按实际安装版本定位并通过 RC 传入。
      - name: Locate rc.exe
        shell: pwsh
        run: |
          if (-not $env:RC) {
            $rc = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\rc.exe' -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending | Select-Object -First 1
            if ($rc) { "RC=$($rc.FullName)" >> $env:GITHUB_ENV }
          }

      # --config 合入 tauri.bundle.conf.json,仅在打包时加入 sidecar 资源;
      # 基础 tauri.conf.json 不含 resources,保证 dev(python gui.py)与 ci 的 cargo check
      # 在未构建 sidecar 时也不会因 glob 匹配不到而失败。tagName 为空时只构建、不建 Release。
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --config src-tauri/tauri.bundle.conf.json
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('交我选 {0}', github.ref_name) || '' }}
          releaseDraft: true
          includeUpdaterJson: false

      - name: Upload installers (manual run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
